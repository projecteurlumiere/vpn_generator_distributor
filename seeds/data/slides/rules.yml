text: |-
  Это сообщение-правила. 
  Пользователь получит его, если нажмёт "Прочитать правила" в главном меню и перед прохожеднием инструкции. 
  
  Сюда также можно прикрепить изображение и использовать _форматирование_ текста.

  Здравствуйте. Сначала немножко о том, как все устроено.
  
  *На этом VPN нельзя делать две вещи:*
  - использовать торренты
  - заниматься хакерством
  Иначе VPN может быть отключен у вас и даже у других пользователей.
